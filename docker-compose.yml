version: '3'
services:
  webapp:
    build:
      context: https://github.com/pidashin/portfolio.git#main
      dockerfile: Dockerfile
    image: portfolio
    container_name: portfolio
    env_file:
      - .env.local
    environment:
      - WORDS_JSON_PATH=/app/data/words.json
      - WORDS_AI_JSON_PATH=/app/data/words_ai.json
      - OCR_RESULTS_PATH=/app/data/ocr-results.json
      - DATABASE_URL=file:/app/data/dev.db
    volumes:
      - /volume1/docker/data:/app/data
    ports:
      - '3000:3000'
    command: sh -c "npx prisma db push && npm start"
